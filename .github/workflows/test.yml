name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phpunit:
    name: phpunit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml, mbstring
          coverage: ${{ matrix.php == '8.3' && 'xdebug' || 'none' }}
          tools: composer:v2
          ini-values: error_reporting=E_ALL, display_errors=On

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-dist'

      - name: Run PHPUnit
        run: composer test

      - name: Upload coverage report
        if: matrix.php == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            clover.xml
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  static-analysis:
    name: static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, libxml, mbstring
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-dist'

      - name: PHPStan
        run: composer stan

      - name: Psalm
        run: composer psalm

      - name: PHP-CS-Fixer (dry-run)
        run: composer cs

  kosit:
    name: KoSIT Schematron
    runs-on: ubuntu-latest
    env:
      XRECHNUNG_KIT_CACHE_DIR: ${{ github.workspace }}/.kosit-cache
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, libxml, mbstring
          coverage: none
          tools: composer:v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-dist'

      - name: Cache KoSIT bundle
        uses: actions/cache@v4
        with:
          path: .kosit-cache
          key: kosit-${{ runner.os }}-${{ hashFiles('kosit-bundle/composer.json', 'composer.lock') }}
          restore-keys: |
            kosit-${{ runner.os }}-

      - name: Validate corpus against KoSIT
        run: composer kosit
