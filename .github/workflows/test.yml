name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phpunit:
    name: phpunit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml, mbstring
          coverage: ${{ matrix.php == '8.3' && 'xdebug' || 'none' }}
          tools: composer:v2
          ini-values: error_reporting=E_ALL, display_errors=On

      # The committed lockfile pins PHPUnit 12 / Psalm 6 which require PHP 8.3+.
      # For the matrix we resolve dependencies fresh per PHP version so older
      # PHP versions pick the highest compatible PHPUnit (11.x for 8.2, 10.x
      # for 8.1) without dragging in versions they cannot run.
      - name: Install dependencies (matrix-resolved per PHP)
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
          composer-options: '--prefer-dist'

      - name: Run PHPUnit
        run: composer test

      - name: Upload coverage report
        if: matrix.php == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            clover.xml
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  static-analysis:
    name: static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, libxml, mbstring
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-dist'

      - name: PHPStan
        run: composer stan

      - name: Psalm
        run: composer psalm

      - name: PHP-CS-Fixer (dry-run)
        run: composer cs

  kosit:
    name: KoSIT Schematron (advisory until bundle data lands)
    runs-on: ubuntu-latest
    # The kosit-bundle ships an empty data/ directory in tree (the validator
    # JAR + scenarios are fetched at install time per the bundle README).
    # Until the fetch is automated as a composer post-install hook, this job
    # cannot validate end-to-end on every PR. continue-on-error keeps it from
    # blocking the merge; the job becomes a hard merge gate the moment the
    # fetch step below populates kosit-bundle/data/.
    continue-on-error: true
    env:
      XRECHNUNG_KIT_CACHE_DIR: ${{ github.workspace }}/.kosit-cache
      KOSIT_VALIDATOR_VERSION: '1.5.0'
      KOSIT_SCENARIOS_VERSION: '2.0.1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, libxml, mbstring
          coverage: none
          tools: composer:v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-dist'

      - name: Cache KoSIT bundle binaries
        id: kosit-cache
        uses: actions/cache@v4
        with:
          path: kosit-bundle/data
          key: kosit-bundle-${{ runner.os }}-${{ env.KOSIT_VALIDATOR_VERSION }}-${{ env.KOSIT_SCENARIOS_VERSION }}

      - name: Fetch KoSIT validator JAR and scenarios (cache miss)
        if: steps.kosit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p kosit-bundle/data/scenarios
          # The actual fetch URLs are pinned in kosit-bundle/README.md. This
          # step is left as a no-op placeholder until the upstream URLs are
          # confirmed stable; populate the curl + unzip commands below to
          # enable real fetch in CI.
          echo "Skipping bundle fetch: confirm KoSIT release URLs first; see kosit-bundle/README.md"

      - name: Validate corpus against KoSIT
        run: composer kosit
